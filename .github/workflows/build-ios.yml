name: Build iOS

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "ios/**"
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "capacitor.config.*"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/build-ios.yml"

permissions:
  contents: read

concurrency:
  group: spicey-ios-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  IOS_SCHEME: App
  IOS_WORKSPACE: ios/App/App.xcworkspace
  IOS_PROJECT: ios/App/App.xcodeproj
  IOS_ARCHIVE_PATH: build/ios/App.xcarchive
  IOS_EXPORT_PATH: build/ios/export

jobs:
  build-ios:
    name: IPA and TestFlight
    runs-on: macos-15
    timeout-minutes: 70

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Install CocoaPods
        working-directory: ios/App
        run: pod install --repo-update

      - name: Restore App Store Connect API key
        env:
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
        run: |
          set -euo pipefail
          test -n "${APPSTORE_CONNECT_API_KEY_BASE64}"
          test -n "${APPSTORE_CONNECT_KEY_ID}"

          mkdir -p "$HOME/private_keys"
          python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["APPSTORE_CONNECT_API_KEY_BASE64"]))' > "$HOME/private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APPSTORE_CONNECT_KEY_ID}.p8"

      - name: Install iOS certificate and provisioning profile
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test -n "${IOS_CERTIFICATE_BASE64}"
          test -n "${IOS_CERTIFICATE_PASSWORD}"
          test -n "${IOS_PROVISION_PROFILE_BASE64}"

          mkdir -p build/ios/signing
          python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["IOS_CERTIFICATE_BASE64"]))' > build/ios/signing/certificate.p12
          python3 -c 'import base64, os, sys; sys.stdout.buffer.write(base64.b64decode(os.environ["IOS_PROVISION_PROFILE_BASE64"]))' > build/ios/signing/profile.mobileprovision

          security create-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" build.keychain
          security import build/ios/signing/certificate.p12 -k build.keychain -P "${IOS_CERTIFICATE_PASSWORD}" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s build.keychain login.keychain
          security default-keychain -s build.keychain
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" build.keychain

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          security cms -D -i build/ios/signing/profile.mobileprovision > build/ios/signing/profile.plist
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' build/ios/signing/profile.plist)"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print Name' build/ios/signing/profile.plist)"
          PROFILE_BUNDLE_ID="$(/usr/libexec/PlistBuddy -c 'Print Entitlements:application-identifier' build/ios/signing/profile.plist | sed 's/^[^.]*\.//')"
          cp build/ios/signing/profile.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"
          echo "IOS_PROFILE_NAME=${PROFILE_NAME}" >> "$GITHUB_ENV"
          echo "IOS_BUNDLE_ID=${PROFILE_BUNDLE_ID}" >> "$GITHUB_ENV"

      - name: Create iOS export options
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          test -n "${APPLE_TEAM_ID}"
          test -n "${IOS_PROFILE_NAME}"
          test -n "${IOS_BUNDLE_ID}"

          mkdir -p build/ios
          cat > build/ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_ID}</key>
              <string>${IOS_PROFILE_NAME}</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
          </dict>
          </plist>
          EOF

      - name: Select iOS build target
        run: |
          set -euo pipefail
          if [ -f "${IOS_WORKSPACE}/contents.xcworkspacedata" ]; then
            echo "IOS_BUILD_DESTINATION=-workspace ${IOS_WORKSPACE}" >> "$GITHUB_ENV"
          else
            echo "IOS_BUILD_DESTINATION=-project ${IOS_PROJECT}" >> "$GITHUB_ENV"
          fi

      - name: Archive iOS app
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            ${IOS_BUILD_DESTINATION} \
            -scheme "${IOS_SCHEME}" \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "${IOS_ARCHIVE_PATH}" \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            PRODUCT_BUNDLE_IDENTIFIER="${IOS_BUNDLE_ID}" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="${IOS_PROFILE_NAME}" \
            clean archive

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild -exportArchive \
            -archivePath "${IOS_ARCHIVE_PATH}" \
            -exportPath "${IOS_EXPORT_PATH}" \
            -exportOptionsPlist build/ios/ExportOptions.plist

          mkdir -p build/artifacts/ios
          IPA_PATH="$(find "${IOS_EXPORT_PATH}" -name '*.ipa' -type f | head -n 1)"
          test -n "${IPA_PATH}"
          cp "${IPA_PATH}" build/artifacts/ios/Spicey.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: spicey-ios-ipa
          path: build/artifacts/ios/Spicey.ipa
          if-no-files-found: error
          retention-days: 30

      - name: Upload IPA to TestFlight
        env:
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          test -n "${APPSTORE_CONNECT_KEY_ID}"
          test -n "${APPSTORE_CONNECT_ISSUER_ID}"

          xcrun altool --upload-app \
            --type ios \
            --file build/artifacts/ios/Spicey.ipa \
            --apiKey "${APPSTORE_CONNECT_KEY_ID}" \
            --apiIssuer "${APPSTORE_CONNECT_ISSUER_ID}"
