name: Submit iOS to App Store Review

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/submit-app-store.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    name: Submit latest TestFlight build
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Restore App Store Connect API key
        env:
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          set -euo pipefail
          test -n "${APPSTORE_CONNECT_API_KEY_BASE64}"
          test -n "${APPSTORE_CONNECT_KEY_ID}"
          test -n "${APPSTORE_CONNECT_ISSUER_ID}"
          mkdir -p build/app-store
          python3 - <<'PY'
          import base64, json, os
          key = base64.b64decode(os.environ["APPSTORE_CONNECT_API_KEY_BASE64"]).decode()
          payload = {
              "key_id": os.environ["APPSTORE_CONNECT_KEY_ID"],
              "issuer_id": os.environ["APPSTORE_CONNECT_ISSUER_ID"],
              "key": key,
              "in_house": False,
          }
          with open("build/app-store/api-key.json", "w") as f:
              json.dump(payload, f)
          PY
          chmod 600 build/app-store/api-key.json

      - name: Submit build 1.0 (1) for App Store review
        run: |
          set -euo pipefail
          fastlane deliver             --api_key_path build/app-store/api-key.json             --app_identifier com.base69fe90d3bbe7ad47925e4a0a.app             --app_version 1.0             --build_number 1             --skip_binary_upload true             --skip_metadata true             --skip_screenshots true             --submit_for_review true             --automatic_release true             --force true             --precheck_include_in_app_purchases false
