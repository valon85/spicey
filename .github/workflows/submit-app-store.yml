name: Verify App Store Review Status

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/submit-app-store.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Verify active App Store submission
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Install API tools
        run: python3 -m pip install --quiet --break-system-packages pyjwt cryptography requests

      - name: Check App Store Connect review status
        env:
          APPSTORE_CONNECT_API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
          APPSTORE_CONNECT_KEY_ID: ${{ secrets.APPSTORE_CONNECT_KEY_ID }}
          APPSTORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_ISSUER_ID }}
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import time
          import jwt
          import requests

          private_key = base64.b64decode(os.environ["APPSTORE_CONNECT_API_KEY_BASE64"]).decode()
          now = int(time.time())
          token = jwt.encode(
              {"iss": os.environ["APPSTORE_CONNECT_ISSUER_ID"], "iat": now, "exp": now + 900, "aud": "appstoreconnect-v1"},
              private_key,
              algorithm="ES256",
              headers={"kid": os.environ["APPSTORE_CONNECT_KEY_ID"], "typ": "JWT"},
          )
          headers = {"Authorization": f"Bearer {token}"}
          base = "https://api.appstoreconnect.apple.com/v1"

          def get(path, params=None):
              response = requests.get(base + path, headers=headers, params=params, timeout=30)
              response.raise_for_status()
              return response.json()

          apps = get("/apps", {"filter[bundleId]": "com.base69fe90d3bbe7ad47925e4a0a.app", "limit": 1})["data"]
          if not apps:
              raise SystemExit("APP_NOT_FOUND")
          app_id = apps[0]["id"]

          versions = get("/appStoreVersions", {
              "filter[app]": app_id,
              "filter[platform]": "IOS",
              "filter[versionString]": "1.0",
              "limit": 1,
          })["data"]
          if not versions:
              raise SystemExit("VERSION_NOT_FOUND")
          attrs = versions[0]["attributes"]

          submissions = get("/reviewSubmissions", {
              "filter[app]": app_id,
              "limit": 20,
          })["data"]
          active_states = {"READY_FOR_REVIEW", "WAITING_FOR_REVIEW", "IN_REVIEW", "UNRESOLVED_ISSUES", "CANCELING", "COMPLETING"}
          active = [item["attributes"]["state"] for item in submissions if item["attributes"]["state"] in active_states]

          print("APP_STORE_VERSION=1.0")
          print("APP_STORE_STATE=" + str(attrs.get("appStoreState")))
          print("RELEASE_TYPE=" + str(attrs.get("releaseType")))
          print("REVIEW_SUBMISSION_STATES=" + json.dumps(active))
          if not active:
              raise SystemExit("NO_ACTIVE_REVIEW_SUBMISSION")
          PY
