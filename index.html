    <script>
      (function applyPreviewThemeEarly() {
        try {
          var previewTheme = new URLSearchParams(window.location.search).get('previewTheme');
          if (previewTheme === 'light') document.documentElement.classList.add('light-mode');
          if (previewTheme === 'dark') document.documentElement.classList.remove('light-mode');
        } catch (e) {}
      })();
    </script>
    <script>
      (function resetLocalPreviewCache() {
        var isLocalPreview = ['127.0.0.1', 'localhost'].includes(window.location.hostname);
        if (!isLocalPreview || !('serviceWorker' in navigator)) return;
        if (!new URLSearchParams(window.location.search).has('resetPreviewCache')) return;
        var resetKey = 'spicey-local-sw-reset-clean7';
        if (sessionStorage.getItem(resetKey)) return;
        sessionStorage.setItem(resetKey, '1');
        Promise.all([
          navigator.serviceWorker.getRegistrations().then(function (regs) {
            return Promise.all(regs.map(function (reg) { return reg.unregister(); }));
          }),
          window.caches ? caches.keys().then(function (keys) {
            return Promise.all(keys.map(function (key) { return caches.delete(key); }));
          }) : Promise.resolve(),
        ]).finally(function () {
          var url = new URL(window.location.href);
          url.searchParams.delete('resetPreviewCache');
          url.searchParams.set('v', String(Date.now()));
          window.location.replace(url.toString());
        });
      })();
    </script>
